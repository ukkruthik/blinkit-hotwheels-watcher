name: Blinkit Hot Wheels Watcher

on:
  schedule:
    # Every 5 minutes. GitHub may delay this by a few minutes during
    # high load — it's a best-effort scheduler, not a guaranteed timer.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the updated state.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run stock check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BLINKIT_PINCODE: ${{ secrets.BLINKIT_PINCODE }}
          SEARCH_TERM: ${{ secrets.SEARCH_TERM }}
        run: python blinkit_check_once.py

      - name: Upload debug snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-snapshot
          path: |
            debug_screenshot.png
            debug_page.html
          retention-days: 3

      - name: Commit updated state
        run: |
          git config user.name "blinkit-watcher-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Update state [skip ci]"
          git push
